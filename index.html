  <title>小熊软糖毕业快乐</title>

      font-family: "Comic Sans MS", "Arial Rounded MT Bold", "幼圆", "YouYuan", "Microsoft YaHei UI", "Microsoft YaHei", cursive, sans-serif;

    }

    }

    @keyframes pixelWipe {
      0% { clip-path: inset(0 100% 0 0); filter: hue-rotate(0deg) contrast(2.2); }

    .pixel-card::before { left: 8px; }

    @keyframes popPixel {

      z-index: 1;
    }

    .game-scene .ground {
      height: 64px;

    }

    .game-scene .ground::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 16px;
      background: repeating-linear-gradient(
        90deg,
        #3d8024 0 16px,
        #4a9e2e 16px 32px
      );
    }

    .pipe {
      position: absolute;
      bottom: 64px;

      background: var(--pipe);
      border: 2px solid var(--pipe-dark);

      backdrop-filter: blur(8px);
    }

    .start-overlay.is-visible,
    .error-overlay.is-visible {

    }

    .panel {
      width: min(92vw, 560px);

      border: 3px solid var(--accent);

      font-size: 14px;
      line-height: 1.65;
      font-weight: 700;
    }

    .pixel-button {
      appearance: none;
      border: 3px solid var(--brick-dark);
      background: var(--coin);
      color: var(--brick);
      padding: 12px 18px;
      font: inherit;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--brick-dark);
      text-transform: uppercase;
    }

    .pixel-button:active {
      transform: translate(3px, 3px);
      box-shadow: 1px 1px 0 var(--brick-dark);
    }

    @media (orientation: portrait) {

        width: 100vw;
        height: 100vh;
        object-fit: cover;

<body>
  <!-- 游戏开始界面 -->
  <div id="gameStartOverlay" class="game-start-overlay">
    <div class="game-scene">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="ground"></div>
      <div class="pipe" style="left: 15%"></div>
      <div class="pipe" style="right: 15%; height: 64px;"></div>
      <div class="brick-block" style="left: 8%; bottom: 180px;"></div>
      <div class="q-block" style="left: calc(8% + 36px); bottom: 180px;">?</div>
      <div class="brick-block" style="left: calc(8% + 72px); bottom: 180px;"></div>
      <div class="brick-block" style="right: 8%; bottom: 220px;"></div>
      <div class="brick-block" style="right: calc(8% + 36px); bottom: 220px;"></div>
      <div class="brick-block" style="right: calc(8% + 72px); bottom: 220px;"></div>
    </div>
    <div class="game-title-area">
      <img class="cover-image" src="assets/cover.jpg" alt="开始封面">
      <button id="gameStartBtn" class="game-btn pixel-text" type="button">冲呀</button>
    </div>
  </div>

  <main class="stage" aria-label="九段视频播放器">
    <div class="game-scene">
      <div class="cloud cloud-1"></div>
      <div class="cloud cloud-2"></div>
      <div class="ground"></div>
    </div>

    <video id="mirrorVideo" class="mirror" muted playsinline webkit-playsinline preload="none" aria-hidden="true"></video>
    <div class="mirror-shade" aria-hidden="true"></div>

    <div class="video-wrap">
      <video id="mainVideo" class="main-video" muted playsinline webkit-playsinline preload="metadata" poster="" aria-label="主视频"></video>
    </div>

    <div id="loader" class="loader" aria-hidden="true">
      <div class="loader-box pixel-text">LOADING...</div>
    </div>

    <div id="transition" class="pixel-transition" aria-hidden="true"></div>

    <section class="hud" aria-live="polite">
      <div id="messageStack" class="message-stack"></div>
      <div class="status-line pixel-text">
        <span id="statusText">VIDEO 01 / 09</span>
        <span id="dots" class="dots" aria-hidden="true"></span>
      </div>
    </section>

    <div id="tapZone" class="tap-zone" role="button" aria-label="视频结束后点击切换到下一个视频"></div>
    <div id="tapHint" class="tap-hint pixel-text">点击下方区域进入下一段</div>
    <button id="speedButton" class="speed-button pixel-text" type="button" aria-label="切换快速播放">快进</button>

    <div id="startOverlay" class="start-overlay">
      <div class="panel">
        <h1 class="pixel-text">继续游戏</h1>
        <p class="pixel-text">点击继续播放</p>
        <button id="startButton" class="pixel-button pixel-text" type="button">继续</button>
      </div>
    </div>

    <div id="errorOverlay" class="error-overlay">
      <div class="panel">
        <h1 class="pixel-text">未找到视频</h1>
        <p id="errorText" class="pixel-text">请把视频放到 assets/videos/ 目录，并命名为 video1.mp4 至 video9.mp4。</p>
        <button id="retryButton" class="pixel-button pixel-text" type="button">重试</button>
      </div>
    </div>
  </main>

  <audio id="bgmAudio" src="assets/bgm.mp3" preload="none" loop></audio>

  <script>
    (function () {
      "use strict";

      var videoList = [
        { src: "assets/videos/video1.mp4", text: "三年前，勇敢的小熊软糖王悦鑫来到东南大学。梧桐叶飞舞，日光弥漫" },
        { src: "assets/videos/video2.mp4", text: "踩着梧桐碎影，你总在埋头苦读。\n清晨捧着四牌楼街口一杯咖啡，在一栋栋教学楼间往复来去" },
        { src: "assets/videos/video3.mp4", text: "倦了就避开熙攘人潮，在蓁巷，选些自己喜欢的饮料吃食" },
        { src: "assets/videos/video4.mp4", text: "远赴意大利求学，水城威尼斯的舟楫轻摇，泛舟完，你沉下心埋头做事" },
        { src: "assets/videos/video5.mp4", text: "威尼斯双年展场中，与师长同窗一众建筑人相聚" },
        { src: "assets/videos/video6.mp4", text: "不知道你是否仍记得新街口，藏着偏爱的衣铺，与念念不忘的烟火味儿" },
        { src: "assets/videos/video7.mp4", text: "你攥紧小小的拳。为心头的研究，一城南京的地铁，跑了个遍" },
        { src: "assets/videos/video8.mp4", text: "会有很多很难的时刻，赶论文的日子里，你总待中大院灯火寥落回家。你真的很了不起" },
        { src: "assets/videos/video9.mp4", text: "恭喜我们最好的小熊软糖王悦鑫毕业啦！你辛苦啦。往后长路，万事顺意" }
      ];

      var endingVideo = {
        src: "assets/videos/ending.mp4"
      };

      var mainVideo = document.getElementById("mainVideo");
      var mirrorVideo = document.getElementById("mirrorVideo");
      var transition = document.getElementById("transition");
      var loader = document.getElementById("loader");
      var messageStack = document.getElementById("messageStack");
      var statusText = document.getElementById("statusText");
      var dots = document.getElementById("dots");
      var tapZone = document.getElementById("tapZone");
      var tapHint = document.getElementById("tapHint");
      var startOverlay = document.getElementById("startOverlay");
      var startButton = document.getElementById("startButton");
      var errorOverlay = document.getElementById("errorOverlay");
      var errorText = document.getElementById("errorText");
      var retryButton = document.getElementById("retryButton");
      var gameStartOverlay = document.getElementById("gameStartOverlay");
      var gameStartBtn = document.getElementById("gameStartBtn");
      var bgmAudio = document.getElementById("bgmAudio");
      var speedButton = document.getElementById("speedButton");

      var currentIndex = 0;
      var ended = false;
      var isSwitching = false;
      var isEnding = false;
      var unlocked = false;
      var gameStarted = false;
      var fastMode = false;
      var normalRate = 1;
      var fastRate = 2.5;
      var touchStartY = 0;
      var touchStartX = 0;

      function pad(num) {
        return String(num).padStart(2, "0");
      }

      function setupDots() {
        dots.innerHTML = "";
        videoList.forEach(function (_, index) {
          var dot = document.createElement("span");
          dot.className = "dot" + (index === currentIndex ? " is-active" : "");
          dots.appendChild(dot);
        });
      }

      function updateHud() {
        statusText.textContent = isEnding ? "ENDING" : "STAGE " + pad(currentIndex + 1) + " / " + pad(videoList.length);
        Array.prototype.forEach.call(dots.children, function (dot, index) {
          dot.classList.toggle("is-active", !isEnding && index === currentIndex);
        });
      }

      function showLoader(show) {
        loader.classList.toggle("is-visible", Boolean(show));
      }

      function runTransition() {
        transition.classList.remove("is-active");
        void transition.offsetWidth;
        transition.classList.add("is-active");
        window.setTimeout(function () {
          transition.classList.remove("is-active");
        }, 780);
      }

      function addPixelMessage(text) {
        messageStack.innerHTML = "";
        var card = document.createElement("div");
        card.className = "pixel-card pixel-text";
        card.textContent = text;
        messageStack.appendChild(card);
      }

      function syncMirrorSource(src) {
        mirrorVideo.pause();
        mirrorVideo.removeAttribute("src");
        mirrorVideo.load();
      }

      function tryPlay(video) {
        var playPromise = video.play();
        if (playPromise && typeof playPromise.then === "function") {
          return playPromise;
        }
        return Promise.resolve();
      }

      function playMirror() {
        return;
      }

      function playBgm() {
        if (!bgmAudio) {
          return;
        }
        bgmAudio.loop = true;
        bgmAudio.volume = 0.45;
        tryPlay(bgmAudio).catch(function () {
          // 移动端浏览器可能需要用户再次点击后才允许播放音频。
        });
      }

      function applyPlaybackRate() {
        mainVideo.playbackRate = fastMode ? fastRate : normalRate;
        speedButton.classList.toggle("is-fast", fastMode);
        speedButton.textContent = fastMode ? "快进中" : "快进";
        speedButton.setAttribute("aria-pressed", fastMode ? "true" : "false");
      }

      function loadVideo(index) {
        currentIndex = (index + videoList.length) % videoList.length;
        ended = false;
        isEnding = false;
        isSwitching = true;
        errorOverlay.classList.remove("is-visible");
        tapHint.classList.remove("is-visible");
        tapHint.textContent = "点击下方区域进入下一段";
        messageStack.innerHTML = "";
        showLoader(true);
        runTransition();
        updateHud();

        var item = videoList[currentIndex];
        mainVideo.pause();
        mainVideo.removeAttribute("src");
        mainVideo.load();
        mainVideo.src = item.src;
        mainVideo.muted = true;
        mainVideo.playsInline = true;
        mainVideo.setAttribute("playsinline", "");
        mainVideo.setAttribute("webkit-playsinline", "");
        syncMirrorSource(item.src);
        applyPlaybackRate();

        mainVideo.load();
        var playWhenReady = function () {
          mainVideo.removeEventListener("canplay", playWhenReady);
          showLoader(false);
          tryPlay(mainVideo)
            .then(function () {
              unlocked = true;
              startOverlay.classList.remove("is-visible");
              playMirror();
              addPixelMessage(item.text);
            })
            .catch(function () {
              startOverlay.classList.add("is-visible");
            })
            .finally(function () {
              isSwitching = false;
            });
        };

        mainVideo.addEventListener("canplay", playWhenReady, { once: true });
      }

      function loadEndingVideo() {
        ended = false;
        isEnding = true;
        isSwitching = true;
        errorOverlay.classList.remove("is-visible");
        tapHint.classList.remove("is-visible");
        tapHint.textContent = "点击下方区域回到第一段";
        messageStack.innerHTML = "";
        showLoader(true);
        runTransition();
        updateHud();

        mainVideo.pause();
        mainVideo.removeAttribute("src");
        mainVideo.load();
        mainVideo.src = endingVideo.src;
        mainVideo.muted = true;
        mainVideo.playsInline = true;
        mainVideo.setAttribute("playsinline", "");
        mainVideo.setAttribute("webkit-playsinline", "");
        syncMirrorSource(endingVideo.src);
        applyPlaybackRate();

        mainVideo.load();
        var playWhenReady = function () {
          mainVideo.removeEventListener("canplay", playWhenReady);
          showLoader(false);
          tryPlay(mainVideo)
            .then(function () {
              unlocked = true;
              startOverlay.classList.remove("is-visible");
              playMirror();
              messageStack.innerHTML = "";
            })
            .catch(function () {
              startOverlay.classList.add("is-visible");
            })
            .finally(function () {
              isSwitching = false;
            });
        };

        mainVideo.addEventListener("canplay", playWhenReady, { once: true });
      }

      function goNext() {
        if (!ended || isSwitching) {
          return;
        }
        if (isEnding) {
          loadVideo(0);
          return;
        }
        if (currentIndex === videoList.length - 1) {
          loadEndingVideo();
          return;
        }
        loadVideo(currentIndex + 1);
      }

      function handleEnded() {
        ended = true;
        showLoader(false);
        mainVideo.pause();

        if (Number.isFinite(mainVideo.duration) && mainVideo.duration > 0) {
          try {
            mainVideo.currentTime = Math.max(0, mainVideo.duration - 0.08);
          } catch (err) {}
        }
        if (!isEnding && currentIndex === videoList.length - 1) {
          isSwitching = true;
          window.setTimeout(function () {
            loadEndingVideo();
          }, 480);
          return;
        }
        tapHint.classList.add("is-visible");
      }

      function showVideoError() {
        showLoader(false);
        isSwitching = false;
        errorText.textContent = "当前无法加载：" + (isEnding ? endingVideo.src : videoList[currentIndex].src) + "。请确认视频文件存在，或替换页面脚本中的视频地址。";
        errorOverlay.classList.add("is-visible");
      }

      function unlockAndPlay() {
        startOverlay.classList.remove("is-visible");
        errorOverlay.classList.remove("is-visible");
        unlocked = true;
        playBgm();
        tryPlay(mainVideo)
          .then(function () {
            playMirror();
          })
          .catch(function () {
            loadVideo(currentIndex);
          });
      }

      function startGame() {
        gameStarted = true;
        gameStartOverlay.classList.add("hidden");
        unlocked = true;
        playBgm();
        loadVideo(0);
      }

      function preventGestureDefaults(event) {
        if (event.touches && event.touches.length > 1) {
          event.preventDefault();
        }
      }

      function onTouchStart(event) {
        preventGestureDefaults(event);
        if (!event.changedTouches || !event.changedTouches.length) {
          return;
        }
        touchStartX = event.changedTouches[0].clientX;
        touchStartY = event.changedTouches[0].clientY;
      }

      function onTouchEnd(event) {
        preventGestureDefaults(event);
        if (!event.changedTouches || !event.changedTouches.length) {
          return;
        }
        var touch = event.changedTouches[0];
        var dx = Math.abs(touch.clientX - touchStartX);
        var dy = Math.abs(touch.clientY - touchStartY);
        if (dy < 36 && dx < 36) {
          goNext();
        }
      }

      function preventDoubleTapZoom() {
        var lastTouchEnd = 0;
        document.addEventListener("touchend", function (event) {
          var now = Date.now();
          if (now - lastTouchEnd <= 320) {
            event.preventDefault();
          }
          lastTouchEnd = now;
        }, { passive: false });
      }

      document.addEventListener("gesturestart", function (event) {
        event.preventDefault();
      });

      document.addEventListener("touchmove", function (event) {
        event.preventDefault();
      }, { passive: false });

      document.addEventListener("contextmenu", function (event) {
        event.preventDefault();
      });

      tapZone.addEventListener("click", goNext);
      tapZone.addEventListener("touchstart", onTouchStart, { passive: false });
      tapZone.addEventListener("touchend", onTouchEnd, { passive: false });

      speedButton.addEventListener("click", function (event) {
        event.stopPropagation();
        fastMode = !fastMode;
        applyPlaybackRate();
      });

      mainVideo.addEventListener("waiting", function () { showLoader(true); });
      mainVideo.addEventListener("playing", function () { showLoader(false); });
      mainVideo.addEventListener("ended", handleEnded);
      mainVideo.addEventListener("error", showVideoError);

      startButton.addEventListener("click", unlockAndPlay);
      retryButton.addEventListener("click", function () {
        if (isEnding) {
          loadEndingVideo();
          return;
        }
        loadVideo(currentIndex);
      });

      gameStartBtn.addEventListener("click", startGame);

      window.addEventListener("pageshow", function () {
        if (gameStarted && unlocked && !ended) {
          tryPlay(mainVideo).catch(function () {});
          playMirror();
          playBgm();
        }
      });

      window.addEventListener("blur", function () {
        mirrorVideo.pause();
      });

      window.addEventListener("focus", function () {
        if (gameStarted && !ended) {
          playMirror();
          playBgm();
        }
      });

      preventDoubleTapZoom();
      setupDots();
    })();
  </script>
</body>
</html>
